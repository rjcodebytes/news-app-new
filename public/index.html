<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>News Feed</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
  <header>
    <h1>📰 News Feed</h1>
    <p>Share and discover the latest news</p>
  </header>

  <section class="form-section">
    <h2>✍️ Add News</h2>
    
    <div class="form-group">
      <label for="title">Title</label>
      <input type="text" id="title" placeholder="Enter news title...">
    </div>
    
    <div class="form-group">
      <label for="description">Description</label>
      <textarea id="description" placeholder="Enter news description..."></textarea>
    </div>

    <div class="button-group">
      <button onclick="addNews()">✨ Add News</button>
      <button class="clear-btn" onclick="clearForm()">Clear</button>
    </div>
  </section>

  <section class="news-section">
    <h2>📋 Latest News</h2>
    <div id="newsList"></div>
  </section>
</div>

<script src="script.js"></script>

</body>
</html>
